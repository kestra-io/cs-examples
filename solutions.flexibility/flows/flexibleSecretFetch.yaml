id: flexibleSecretFetch
namespace: solutions.flexibility

description: |
  Flexibility demo, paired with the F.I.R.E. blog post's "Flexibility" pillar.

  Centerpiece: files/secret_fetch_comparison.sh shows, side by side in one
  script, what fetching a secret looks like WITHOUT Kestra (assume an IAM
  role, then call SSM/Secrets Manager yourself) versus WITH Kestra
  ({{ secret('...') }} resolved at runtime, injected as a plain env var —
  no role assumption, no second API call, and Kestra auto-redacts the value
  from logs).

  Also shows Pebble's dynamic templating: `environment` picks which secret
  key to fetch at runtime, so this one flow definition serves dev/staging/
  prod without forking.

  Requires secrets named DEV_DB_PASSWORD / STAGING_DB_PASSWORD /
  PROD_DB_PASSWORD (matching whichever `environment` you run with) to
  already exist in your Kestra instance's secret backend.

labels:
  - key: "maintainer"
    value: "faizan"
  - key: "feature"
    value: "flexibility"

inputs:
  - id: environment
    type: SELECT
    values: [dev, staging, prod]
    defaults: dev

tasks:
  - id: fetch_secret_the_kestra_way
    type: io.kestra.plugin.scripts.shell.Commands
    namespaceFiles:
      enabled: true
      include:
        - secret_fetch_comparison.sh
    env:
      DB_PASSWORD: "{{ secret(inputs.environment | upper ~ '_DB_PASSWORD') }}"
    commands:
      - chmod +x secret_fetch_comparison.sh
      - ./secret_fetch_comparison.sh
