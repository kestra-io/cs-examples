id: alerting_resubmission_trigger
namespace: solutions.demo

labels:
  maintainer: "parham"
  alerting: feature
  notifications: feature
  resubmission: feature

tasks:
  - id: log_failure
    type: io.kestra.plugin.core.log.Log
    message: |
      Re-executing Flow: {{trigger.flowId ?? 'N/A'}} [{{trigger.executionId ?? 'N/A'}}]
      labels: {{trigger.executionLabels}}

  - id: sleep
    type: io.kestra.plugin.core.flow.Sleep
    duration: PT3S

  - id: retry_subflow
    type: io.kestra.plugin.core.flow.Subflow
    flowId: "{{trigger.flowId}}"
    namespace: "{{trigger.namespace}}"
    wait: true
    transmitFailed: false
    labels: 
      implicit: true
    

triggers:
  - id: listen
    type: io.kestra.plugin.core.trigger.Flow
    disabled: true
    dependsOn:
      - flowId: alerting_error_handling
        namespace: solutions.demo
        labels:
          implicit: false
        when: "{{ trigger.namespace startsWith 'solutions.demo' }}"
        states:
          - FAILED
          - WARNING
